name: Deploy baduk_ratings

on:
  push:
    branches: [main]
  schedule:
    # Daily data refresh around 18:00 Asia/Seoul. Avoid minute 0 because
    # GitHub scheduled workflows can be delayed or dropped at high-load times.
    - cron: '17 9 * * *'
    # Backup refresh if the primary scheduled run is delayed, dropped, or hits
    # a transient upstream source issue.
    - cron: '7 11 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.13.1'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate data snapshot
        timeout-minutes: 20
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: qwen/qwen3.7-plus
          OPENROUTER_TRANSLATION_TIMEOUT_MS: 90000
          OPENROUTER_TRANSLATION_BUDGET_MS: 480000
          OPENROUTER_TRANSLATION_BATCH_SIZE: 4
          OPENROUTER_NEWS_TRANSLATION_LIMIT: 12
          OPENROUTER_SCHEDULE_TRANSLATION_LIMIT: 24
        run: npm run generate:data

      - name: Validate
        run: |
          npm run lint
          npm run test:unit
          npm test
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Python schema tests
        run: |
          pip install pytest
          pytest

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
